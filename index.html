<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Muhammad Aleem Naveed — AI Solutions Developer</title>
    <meta
      name="description"
      content="AI Solutions Developer based in Lahore, Pakistan. I ship working software by directing the right AI platform at the right task."
    />

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Geist + Inter via Fontsource/Vercel CDN -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <!-- Geist is loaded as a fallback alias to Inter/JetBrains Mono below since
         Google Fonts does not host Geist; swap for next/font or a self-hosted
         Geist file in production for pixel-exact match. -->

    <style>
      :root {
        color-scheme: dark;
      }
      html {
        scroll-behavior: smooth;
      }
      @media (prefers-reduced-motion: reduce) {
        html {
          scroll-behavior: auto;
        }
        *,
        *::before,
        *::after {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
          scroll-behavior: auto !important;
        }
      }
      body {
        margin: 0;
        background: #0a0a0a;
      }
      ::-webkit-scrollbar {
        width: 10px;
      }
      ::-webkit-scrollbar-track {
        background: #0a0a0a;
      }
      ::-webkit-scrollbar-thumb {
        background: #2a2a2a;
        border-radius: 999px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #3a3a3a;
      }
      :focus-visible {
        outline: 2px solid #ffffff;
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
